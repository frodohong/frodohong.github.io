<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tally - 공식 홈페이지 및 고객지원</title>
    <style>
        /* 글로벌 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* 컨테이너 */
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        /* 상단 앱 소개 영역 */
        .hero {
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #f9f9fa 100%);
        }        
        /* 실제 이미지가 준비되면 위 클래스 대신 img 태그 사용 */
        .app-icon-img {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; }
        .subtitle { margin-top: 10px; font-size: 17px; color: #86868b; line-height: 1.4; }

        /* 다운로드 버튼 영역 */
        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px 40px;
            margin-top: 10px;
        }

        .btn-store {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .btn-store:active { transform: scale(0.98); }
        
        .ios { background-color: #000; color: white; }
        .android { background-color: #007aff; color: white; }

        /* 고객 지원 및 정보 영역 */
        .section { padding: 30px 20px; border-top: 1px solid #eee; }
        .section-title { font-size: 19px; font-weight: 600; margin-bottom: 15px; }
        
        .contact-box {
            background-color: #f5f5f7;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .contact-text { font-size: 15px; color: #555; margin-bottom: 15px; }
        .btn-contact {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #007aff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* 하단 푸터 */
        footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
            background-color: #fafafa;
            border-top: 1px solid #eee;
        }
        footer a { color: #666; text-decoration: none; margin: 0 8px; }
        footer a:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="hero">
            <div class="app-icon-placeholder"><img src="icon.png" alt="My Tally" width="120" height="120" class="app-icon-img"></div> 
            
            <h1>My Tally</h1>
            <!-- <p class="subtitle">
                가장 심플하고 강력한 카운터 앱.<br>
                Simple, Fast, and Powerful Tally Counter.
            </p> -->
        </div>

        <!-- <div class="store-buttons">
            <a href="#" class="btn-store ios" target="_blank">
                 Download on the App Store
            </a>
            <a href="#" class="btn-store android" target="_blank">
                🤖 Get it on Google Play
            </a>
        </div> -->

        <div class="section">
            <div class="section-title">고객 지원 (Support)</div>
            <div class="contact-box">
                <p class="contact-text">
                    앱 사용 중 문제가 발생했거나 제안하고 싶은 기능이 있으신가요?<br>
                    아래 버튼을 눌러 이메일을 보내주세요.
                </p>
                <a href="mailto:auspicioussource@gmail.com" class="btn-contact">
                    개발자에게 문의하기 (Contact Us)
                </a>
                
                </div>
        </div>

        <footer>
            <a href="privacy.html"><strong>개인정보처리방침 (Privacy Policy)</strong></a>
            <br><br>
            &copy; 2026 My Tally Developer. All rights reserved.
        </footer>

    </div>

</body>
</html>
