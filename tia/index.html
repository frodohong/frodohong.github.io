<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA (Today I Ate) - 공식 홈페이지 및 고객지원</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .hero {
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #fff5f5 100%);
        }
        .app-icon-img {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(255,107,107,0.15);
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; }
        .subtitle { margin-top: 10px; font-size: 17px; color: #86868b; line-height: 1.4; }

        .section { padding: 30px 20px; border-top: 1px solid #eee; }
        .section-title { font-size: 19px; font-weight: 600; margin-bottom: 15px; }

        .contact-box {
            background-color: #f5f5f7;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .contact-text { font-size: 15px; color: #555; margin-bottom: 15px; line-height: 1.5; }
        .btn-contact {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #FF6B6B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
            background-color: #fafafa;
            border-top: 1px solid #eee;
        }
        footer a { color: #666; text-decoration: none; margin: 0 8px; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">

        <div class="hero">
            <img src="icon.png" alt="TIA" width="120" height="120" class="app-icon-img">
            <h1>TIA</h1>
            <p class="subtitle">
                Today I Ate<br>
                여행과 일상의 미식 타임라인
            </p>
        </div>

        <div class="section">
            <div class="section-title">고객 지원 (Support)</div>
            <div class="contact-box">
                <p class="contact-text">
                    앱 사용 중 문제가 발생했거나 제안하고 싶은 기능이 있으신가요?<br>
                    아래 버튼을 눌러 이메일을 보내주세요.<br><br>
                    Have a question or feature suggestion?<br>
                    Click the button below to email us.
                </p>
                <a href="mailto:auspicioussource@gmail.com" class="btn-contact">
                    개발자에게 문의하기 (Contact Us)
                </a>
            </div>
        </div>

        <footer>
            <a href="privacy.html"><strong>개인정보처리방침 (Privacy Policy)</strong></a>
            <br><br>
            &copy; 2026 TIA Developer. All rights reserved.
        </footer>

    </div>

</body>
</html>
